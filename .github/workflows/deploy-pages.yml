name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # No cancelar un deploy en curso: cancelarlo a mitad puede dejar el entorno
  # github-pages colgado y encolar los siguientes indefinidamente. Se encola.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Build (SPA estático)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_API_URL: "https://oracleapex.com/ords/josegalvez/lubrimec/"
          VITE_APP_ID: "86972"

      - name: Preparar salida para Pages
        run: |
          cp .output/public/_shell.html .output/public/index.html
          cp .output/public/_shell.html .output/public/404.html
          touch .output/public/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
